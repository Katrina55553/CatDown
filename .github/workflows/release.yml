name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --win --publish never

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/CatDown-*-setup.exe
            release/CatDown-*-setup.exe.blockmap
            release/latest.yml
          draft: true
